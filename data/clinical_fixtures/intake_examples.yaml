# Additional synthetic clinical intake examples.
#
# Same schema as data/real_world_corpus.yaml. All entries are synthetic
# (not from real patients). Use this file to prototype new fixtures
# without touching the shared corpus that the main bh-sentinel repo
# mirrors.

fixtures:
  - id: intake_med_only
    source: synthetic
    year: 2026
    public_domain: true
    category: clinical_vignette
    expected_flags_hint: [MED-002, MED-005]
